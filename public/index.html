<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bajaj Housing Finance — Balance Transfer AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;width:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:#111827}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes pulseRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.6);opacity:0}}
    @keyframes spinSlow{to{transform:rotate(360deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both}
    .fade-in{animation:fadeIn .5s ease both}
    .slide-up{animation:slideUp .5s cubic-bezier(.16,1,.3,1) both}
    .d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}
    input:focus,select:focus{border-color:#002953!important;outline:none;box-shadow:0 0 0 3px rgba(0,41,83,.1)!important}
    select option{background:#fff;color:#111827}
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-type="module">
const{useState,useEffect,useRef,useCallback}=React;

const POLL_INTERVAL=4000;
const NAVY="#002953";
const ORANGE="#FF6700";

const AGENT={
  id:"ce1ff860-5bf8-4cbc-9c54-49abc9d7c15b",
  name:"Bajaj Housing Finance Loan Transfer Agent",
  lang:"Hinglish",
  color:ORANGE,
  desc:"Our multilingual AI agent will call you in Hinglish to assess your home loan balance transfer eligibility and walk you through the best options available to you.",
};

const CITIES=["Mumbai","Nagpur","Bangalore","Hyderabad"];
const LOAN_AMOUNTS=["15","25","50","75"];

const STATUS_META={
  NOT_STARTED:{label:"Not Started",color:"#6b7280",icon:"⏳",step:0},
  SCHEDULED:{label:"Scheduled",color:"#d97706",icon:"📋",step:1},
  INITIATED:{label:"Initiated",color:"#3b82f6",icon:"📡",step:2},
  RINGING:{label:"Ringing",color:"#3b82f6",icon:"🔔",step:3},
  IN_PROGRESS:{label:"In Progress",color:"#10b981",icon:"🗣️",step:4},
  COMPLETED:{label:"Completed",color:"#10b981",icon:"✅",step:5},
  NOT_CONNECTED:{label:"Not Connected",color:"#f59e0b",icon:"📵",step:5},
  CANCELLED:{label:"Cancelled",color:"#ef4444",icon:"🚫",step:5},
  FAILED:{label:"Failed",color:"#ef4444",icon:"❌",step:5},
};
const PIPELINE=["NOT_STARTED","SCHEDULED","INITIATED","RINGING","IN_PROGRESS","COMPLETED"];
const TERMINAL=["COMPLETED","NOT_CONNECTED","CANCELLED","FAILED"];

function fmtDur(s){if(!s)return"—";const mm=Math.floor(s/60),ss=Math.round(s%60);return mm>0?`${mm}m ${ss}s`:`${ss}s`;}
function normSt(s){return(s||"NOT_STARTED").toUpperCase().replace(/ /g,"_");}

const PhoneIcon=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>;
const LogOutIcon=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
const BackIcon=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
const NavIcon=({type})=>type==="about"
  ?<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  :<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>;

function PulseRing({color,size=130,status}){
  const isTerm=TERMINAL.includes(status);
  const isAct=status==="IN_PROGRESS";
  const m=STATUS_META[status]||STATUS_META.NOT_STARTED;
  return(
    <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
      {!isTerm&&<>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${color}33`,animation:"pulseRing 2s ease-out infinite"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${color}22`,animation:"pulseRing 2s ease-out infinite .6s"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${color}11`,animation:"pulseRing 2s ease-out infinite 1.2s"}}/>
      </>}
      <div style={{position:"absolute",inset:12,borderRadius:"50%",background:`radial-gradient(circle at 40% 35%,${color}22,${color}08)`,border:`2px solid ${color}${isTerm?"55":"44"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.3,transition:"all .5s"}}>{m.icon}</div>
      {isAct&&<div style={{position:"absolute",inset:4,borderRadius:"50%",border:"2px solid transparent",borderTopColor:color,animation:"spinSlow 3s linear infinite"}}/>}
    </div>
  );
}

function ElapsedTimer({startTime,endTime}){
  const[el,setEl]=useState(0);
  useEffect(()=>{
    if(!startTime)return;
    if(endTime){setEl(Math.round((new Date(endTime)-new Date(startTime))/1000));return;}
    const iv=setInterval(()=>setEl(Math.round((Date.now()-new Date(startTime).getTime())/1000)),1000);
    return()=>clearInterval(iv);
  },[startTime,endTime]);
  if(!startTime)return null;
  const mm=Math.floor(el/60),ss=el%60;
  return<span style={{fontFamily:"'Space Mono',monospace",fontSize:28,fontWeight:700,letterSpacing:".05em",color:NAVY}}>{String(mm).padStart(2,"0")}:{String(ss).padStart(2,"0")}</span>;
}

function App(){
  const[page,setPage]=useState("playground");
  const[loggedIn,setLoggedIn]=useState(false);
  const[form,setForm]=useState({firstName:"",lastName:"",mobile:"",city:"",loanAmount:""});
  const[user,setUser]=useState(null);
  const userRef=useRef(null);
  const[mounted,setMounted]=useState(false);
  const[activeCall,setActiveCall]=useState(null);
  const[callData,setCallData]=useState(null);
  const[triggerError,setTriggerError]=useState(null);
  const[triggering,setTriggering]=useState(null);
  const pollRef=useRef(null);
  const loggedRef=useRef(false);

  useEffect(()=>{setMounted(true);},[]);

  const pollCall=useCallback(async(callId)=>{
    try{
      const res=await fetch(`/api/calls/${callId}`);
      if(!res.ok)return;
      const text=await res.text();
      if(!text)return;
      const data=JSON.parse(text);
      setCallData(data);
      if(TERMINAL.includes(normSt(data.status))){
        clearInterval(pollRef.current);pollRef.current=null;
        if(!loggedRef.current){
          loggedRef.current=true;
          const fetchCall=async(id)=>{
            try{const res=await fetch(`/api/calls/${id}`);if(res.ok){const t=await res.text();if(t)return JSON.parse(t);}
            }catch(e){}return null;
          };
          const logWhenReady=async()=>{
            let latest=data;
            for(let i=0;i<8;i++){
              if(latest.result&&Object.keys(latest.result).length>0)break;
              await new Promise(r=>setTimeout(r,3000));
              const d=await fetchCall(latest.id);if(d){latest=d;setCallData(d);}
            }
            fetch("/api/log",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...latest,city:userRef.current?.city||"",loan_amount_lakhs:userRef.current?.loanAmount||""})})
              .catch(e=>console.error("Sheet log error:",e));
            await new Promise(r=>setTimeout(r,5*60*1000));
            const final=await fetchCall(latest.id);
            if(final){
              setCallData(final);
              fetch("/api/log",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...final,city:userRef.current?.city||"",loan_amount_lakhs:userRef.current?.loanAmount||""})})
                .catch(e=>console.error("Sheet 5min log error:",e));
            }
          };
          logWhenReady();
        }
      }
    }catch(e){console.error("Poll error:",e);}
  },[]);

  const startPolling=useCallback((callId)=>{
    if(pollRef.current)clearInterval(pollRef.current);
    pollCall(callId);
    pollRef.current=setInterval(()=>pollCall(callId),POLL_INTERVAL);
  },[pollCall]);

  useEffect(()=>()=>{if(pollRef.current)clearInterval(pollRef.current);},[]);

  const triggerCall=async()=>{
    if(!user)return;
    setTriggering(AGENT.id);
    setTriggerError(null);
    loggedRef.current=false;
    const mobile10=user.mobile.replace(/\D/g,"").slice(-10);
    const payload={
      agent_id:AGENT.id,
      callee_name:`${user.firstName} ${user.lastName}`,
      mobile_number:mobile10,
      custom_data:{first_name:user.firstName,city:user.city,loan_amount:user.loanAmount},
    };
    try{
      const res=await fetch("/api/calls",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const text=await res.text();
      if(!text)throw new Error("Empty response from server");
      const data=JSON.parse(text);
      if(res.ok){
        setActiveCall({callId:data.id,status:data.status});
        setCallData(data);setPage("monitor");startPolling(data.id);
      }else{
        setTriggerError(data.message||data.detail||JSON.stringify(data));
      }
    }catch(err){
      setTriggerError(err.message||"Network error");
    }finally{setTriggering(null);}
  };

  const goBack=()=>{if(pollRef.current){clearInterval(pollRef.current);pollRef.current=null;}setActiveCall(null);setCallData(null);setTriggerError(null);setPage("playground");};

  const handleLogin=()=>{
    const mobile=form.mobile.replace(/\D/g,"");
    if(!form.firstName||!form.lastName||mobile.length<10||!form.city||!form.loanAmount)return;
    const u={...form,mobile};
    setUser(u);
    userRef.current=u;
    setLoggedIn(true);
  };

  const handleLogout=()=>{
    if(pollRef.current){clearInterval(pollRef.current);pollRef.current=null;}
    setLoggedIn(false);setUser(null);userRef.current=null;
    setActiveCall(null);setCallData(null);
    setForm({firstName:"",lastName:"",mobile:"",city:"",loanAmount:""});
    setPage("playground");
  };

  const rawSt=callData?normSt(callData.status):"NOT_STARTED";
  const curSt=STATUS_META[rawSt]?rawSt:"NOT_STARTED";
  const meta=STATUS_META[curSt];
  const isTerm=TERMINAL.includes(curSt);
  const agC=AGENT.color;

  const inp={width:"100%",padding:"14px 16px",background:"#fff",border:"1px solid #d1d5db",borderRadius:10,color:"#111827",fontSize:15,fontFamily:"'DM Sans',sans-serif",outline:"none",transition:"border .2s, box-shadow .2s"};
  const sel={...inp,cursor:"pointer",appearance:"none",WebkitAppearance:"none",backgroundImage:`url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23374151' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 14px center"};
  const lbl={fontSize:12,fontWeight:600,color:"#374151",letterSpacing:".04em",textTransform:"uppercase",display:"block",marginBottom:8};
  const card={background:"#fff",borderRadius:16,padding:28,boxShadow:"0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,41,83,.07)"};
  const formValid=form.firstName&&form.lastName&&form.mobile.replace(/\D/g,"").length>=10&&form.city&&form.loanAmount;

  return(
    <div style={{display:"flex",height:"100vh",width:"100vw",overflow:"hidden"}}>

      {/* SIDEBAR */}
      <div style={{width:260,minWidth:260,background:NAVY,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"28px 24px 20px",borderBottom:"1px solid rgba(255,255,255,.1)"}}>
          <img
            src="https://www.bajajhousingfinance.in/o/bhfl-theme/images/brand-logo/Bajaj_Finserv_Digital_Logo_Reverse.svg"
            alt="Bajaj Housing Finance"
            style={{height:44,width:"auto",maxWidth:200,objectFit:"contain"}}
            onError={e=>{
              e.target.style.display="none";
              e.target.nextSibling.style.display="flex";
            }}
          />
          <div style={{display:"none",alignItems:"center",gap:8}}>
            <div style={{width:34,height:34,borderRadius:8,background:ORANGE,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,color:"#fff",fontFamily:"'Space Mono',monospace"}}>B</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#fff",letterSpacing:"-.01em",lineHeight:1.2}}>BAJAJ</div>
              <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",letterSpacing:".05em",textTransform:"uppercase"}}>Housing Finance</div>
            </div>
          </div>
          <p style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:12}}>Powered by Hunar.ai</p>
        </div>

        <nav style={{padding:"16px 12px",flex:1}}>
          {[{key:"playground",label:"Application",icon:"playground"},{key:"about",label:"About Hunar.ai",icon:"about"}].map(item=>(
            <button key={item.key} onClick={()=>item.key==="playground"?goBack():setPage(item.key)}
              style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",marginBottom:4,background:(page===item.key||(page==="monitor"&&item.key==="playground"))?"rgba(255,255,255,.12)":"transparent",border:"none",borderRadius:10,cursor:"pointer",color:"#fff",fontSize:14,fontWeight:(page===item.key||(page==="monitor"&&item.key==="playground"))?600:400,fontFamily:"'DM Sans',sans-serif",transition:"all .2s",opacity:(page===item.key||(page==="monitor"&&item.key==="playground"))?1:.55}}>
              <NavIcon type={item.icon}/>{item.label}
            </button>
          ))}
        </nav>

        {loggedIn&&user&&(
          <div style={{padding:"16px 16px 20px",borderTop:"1px solid rgba(255,255,255,.1)",animation:"slideIn .3s ease both"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,border:"2px solid rgba(255,255,255,.2)",color:"#fff",flexShrink:0}}>{user.firstName[0]}{user.lastName[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"#fff"}}>{user.firstName} {user.lastName}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>+91 {user.mobile}</div>
              </div>
              <button onClick={handleLogout} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",cursor:"pointer",padding:6,borderRadius:6,display:"flex"}} title="Start over"><LogOutIcon/></button>
            </div>
          </div>
        )}
      </div>

      {/* MAIN */}
      <div style={{flex:1,overflow:"auto",background:"#f0f4f8"}}>

        {/* ── FORM PAGE ── */}
        {page==="playground"&&!loggedIn&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100%",padding:"40px 24px"}}>
            <div className={mounted?"fade-up":""} style={{width:"100%",maxWidth:520}}>
              <div style={{marginBottom:28}}>
                <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${ORANGE}18`,border:`1px solid ${ORANGE}30`,borderRadius:20,padding:"6px 14px",marginBottom:16}}>
                  <span style={{fontSize:13}}>🏠</span>
                  <span style={{fontSize:12,fontWeight:600,color:ORANGE,letterSpacing:".05em",textTransform:"uppercase"}}>Balance Transfer</span>
                </div>
                <h1 style={{fontSize:24,fontWeight:700,letterSpacing:"-.02em",color:NAVY,lineHeight:1.3,marginBottom:10}}>Apply here to explore Balance Transfer options with Bajaj Housing Finance</h1>
                <p style={{fontSize:14,color:"#6b7280",lineHeight:1.6}}>Fill in your details below and our AI agent will call you to check your eligibility.</p>
              </div>

              <div style={{...card,padding:32}}>
                <div style={{display:"flex",flexDirection:"column",gap:18}}>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}>
                      <label style={lbl}>First Name</label>
                      <input value={form.firstName} onChange={e=>setForm({...form,firstName:e.target.value})} placeholder="First name" style={inp}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={lbl}>Last Name</label>
                      <input value={form.lastName} onChange={e=>setForm({...form,lastName:e.target.value})} placeholder="Last name" style={inp}/>
                    </div>
                  </div>

                  <div>
                    <label style={lbl}>Mobile Number</label>
                    <div style={{display:"flex",gap:8}}>
                      <div style={{padding:"14px 16px",background:"#f9fafb",border:"1px solid #d1d5db",borderRadius:10,fontSize:14,color:"#374151",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>+91 🇮🇳</div>
                      <input value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value.replace(/[^0-9]/g,"")})} placeholder="10-digit mobile number" type="tel" maxLength={10} style={{...inp,flex:1,width:"auto"}}/>
                    </div>
                  </div>

                  <div>
                    <label style={lbl}>City</label>
                    <select value={form.city} onChange={e=>setForm({...form,city:e.target.value})} style={sel}>
                      <option value="">Select your city</option>
                      {CITIES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>

                  <div>
                    <label style={lbl}>Existing Loan Amount</label>
                    <select value={form.loanAmount} onChange={e=>setForm({...form,loanAmount:e.target.value})} style={sel}>
                      <option value="">Select loan amount</option>
                      {LOAN_AMOUNTS.map(l=><option key={l} value={l}>₹{l} Lakhs</option>)}
                    </select>
                  </div>

                  <button onClick={handleLogin} disabled={!formValid}
                    style={{marginTop:4,width:"100%",padding:"16px",background:formValid?ORANGE:"#e5e7eb",color:formValid?"#fff":"#9ca3af",border:"none",borderRadius:10,fontSize:15,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:formValid?"pointer":"not-allowed",transition:"all .25s",letterSpacing:".01em"}}>
                    Continue →
                  </button>
                </div>
              </div>

              <p style={{fontSize:12,color:"#9ca3af",marginTop:20,textAlign:"center"}}>By continuing, you agree to receive a voice AI call on your registered mobile number.</p>
            </div>
          </div>
        )}

        {/* ── AGENT PAGE ── */}
        {page==="playground"&&loggedIn&&(
          <div style={{padding:"40px 48px",maxWidth:680,margin:"0 auto"}}>
            <div className="fade-up" style={{marginBottom:28}}>
              <p style={{fontSize:13,fontWeight:600,color:ORANGE,letterSpacing:".06em",textTransform:"uppercase",marginBottom:8}}>Eligibility Check</p>
              <h1 style={{fontSize:26,fontWeight:700,letterSpacing:"-.02em",color:NAVY,marginBottom:6}}>You're all set, {user.firstName}!</h1>
              <p style={{fontSize:15,color:"#6b7280"}}>Trigger a call to <strong style={{color:NAVY}}>+91 {user.mobile}</strong> to check your balance transfer eligibility.</p>
            </div>

            {/* Details summary strip */}
            <div className="fade-up d1" style={{...card,padding:"16px 24px",marginBottom:20,display:"flex",gap:28,flexWrap:"wrap",alignItems:"center"}}>
              {[["🏙️","City",user.city],["💰","Loan Amount",`₹${user.loanAmount} Lakhs`],["🗣️","Language","Hinglish"]].map(([ic,l,v])=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{ic}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".04em"}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:600,color:NAVY}}>{v}</div>
                  </div>
                </div>
              ))}
            </div>

            {triggerError&&(
              <div className="fade-in" style={{padding:"14px 18px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
                <span style={{color:"#ef4444",fontSize:16}}>⚠️</span>
                <span style={{fontSize:13,color:"#ef4444",wordBreak:"break-word"}}>{triggerError}</span>
              </div>
            )}

            {/* Single agent card */}
            <div className="fade-up d2" style={{...card,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:`linear-gradient(90deg,${ORANGE},#F09819)`}}/>
              <div style={{display:"flex",alignItems:"flex-start",gap:16,marginBottom:24,paddingTop:8}}>
                <div style={{width:54,height:54,borderRadius:14,background:`${ORANGE}15`,border:`1px solid ${ORANGE}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🏠</div>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:ORANGE,background:`${ORANGE}15`,padding:"3px 10px",borderRadius:20,letterSpacing:".03em"}}>Hinglish</span>
                    <span style={{fontSize:12,fontWeight:600,color:"#10b981",background:"#10b98115",padding:"3px 10px",borderRadius:20}}>● Live</span>
                  </div>
                  <h3 style={{fontSize:18,fontWeight:700,color:NAVY,letterSpacing:"-.02em",marginBottom:6}}>{AGENT.name}</h3>
                  <p style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>{AGENT.desc}</p>
                </div>
              </div>

              <button onClick={triggerCall} disabled={triggering!==null}
                style={{width:"100%",padding:"16px 20px",background:triggering?"#e5e7eb":ORANGE,color:triggering?"#9ca3af":"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:triggering?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all .2s",letterSpacing:".01em"}}>
                {triggering
                  ?<><div style={{width:18,height:18,border:"2px solid #ccc",borderTopColor:ORANGE,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>Triggering call…</>
                  :<><PhoneIcon/>Trigger a call to yourself to see your eligibility</>
                }
              </button>

              <div style={{marginTop:12,fontSize:11,color:"#d1d5db",fontFamily:"'Space Mono',monospace",textAlign:"center"}}>Agent ID: {AGENT.id}</div>
            </div>
          </div>
        )}

        {/* ── CALL MONITOR ── */}
        {page==="monitor"&&activeCall&&(
          <div style={{padding:"40px 48px"}}>
            <div className="fade-up" style={{marginBottom:28}}>
              <button onClick={goBack} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,fontFamily:"'DM Sans',sans-serif",marginBottom:20,padding:0}}>
                <BackIcon/> Back to Application
              </button>
              <p style={{fontSize:13,fontWeight:600,color:ORANGE,letterSpacing:".06em",textTransform:"uppercase",marginBottom:8}}>Call Monitor</p>
              <h1 style={{fontSize:26,fontWeight:700,letterSpacing:"-.02em",color:NAVY}}>🏠 Balance Transfer Agent · Hinglish</h1>
            </div>

            <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>

              {/* LEFT: Status */}
              <div style={{flex:1,minWidth:0}}>
                <div className="fade-up d1" style={{...card,textAlign:"center",position:"relative",overflow:"hidden",padding:"40px 32px"}}>
                  <div style={{position:"absolute",inset:0,opacity:.04,background:`radial-gradient(ellipse at 50% 0%,${agC},transparent 70%)`}}/>
                  <PulseRing color={agC} size={130} status={curSt}/>
                  <div style={{marginTop:24}}>
                    <span style={{fontSize:13,fontWeight:700,color:meta.color,background:meta.color+"18",padding:"5px 14px",borderRadius:20,letterSpacing:".04em",textTransform:"uppercase"}}>{meta.label}</span>
                  </div>
                  <div style={{marginTop:20}}>
                    <ElapsedTimer startTime={callData?.started_at} endTime={isTerm?callData?.ended_at:null}/>
                    {!callData?.started_at&&<span style={{fontSize:14,color:"#9ca3af"}}>Waiting for connection…</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginTop:28}}>
                    {PIPELINE.map(step=>{
                      const sn=STATUS_META[step].step,cn=meta.step,ic=step===curSt,ip=sn<cn;
                      return<div key={step} style={{width:ic?32:8,height:8,borderRadius:4,background:ip||ic?agC:"#e5e7eb",transition:"all .4s",opacity:ip?.5:1}}/>;
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"center",gap:32,marginTop:28,fontSize:12,color:"#9ca3af"}}>
                    <div><span style={{color:"#d1d5db"}}>Callee</span><br/><span style={{color:NAVY,fontWeight:600}}>{callData?.callee_name||`${user?.firstName} ${user?.lastName}`}</span></div>
                    <div><span style={{color:"#d1d5db"}}>Number</span><br/><span style={{color:NAVY,fontWeight:600}}>+91 {user?.mobile}</span></div>
                    <div><span style={{color:"#d1d5db"}}>Call ID</span><br/><span style={{color:NAVY,fontWeight:600,fontFamily:"'Space Mono',monospace",fontSize:11}}>{activeCall.callId?.slice(0,12)}…</span></div>
                  </div>
                  {!isTerm&&<p style={{marginTop:24,fontSize:12,color:"#9ca3af",animation:"pulse 2s infinite"}}>Polling for updates every {POLL_INTERVAL/1000}s…</p>}
                </div>

                {isTerm&&(
                  <div className="slide-up" style={{textAlign:"center",marginTop:16}}>
                    <button onClick={goBack} style={{padding:"14px 32px",background:NAVY,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>← Start Over</button>
                  </div>
                )}
              </div>

              {/* RIGHT: Panels */}
              <div style={{flex:"0 0 320px",display:"flex",flexDirection:"column",gap:16}}>

                {/* Call Insights */}
                <div className="fade-up d2" style={{...card,padding:24}}>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:16,color:NAVY,display:"flex",alignItems:"center",gap:8}}><span>📊</span> Call Insights</h3>
                  <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #f3f4f6"}}>
                    {[
                      ["Status",isTerm?meta.label:null,isTerm?meta.color:null],
                      ["Engagement",callData?.engagement_status||null,callData?.engagement_status==="ENGAGED"?"#10b981":callData?.engagement_status==="NOT_ENGAGED"?"#f59e0b":null],
                      ["Duration",callData?.duration_seconds?fmtDur(callData.duration_seconds):null,null],
                      ["User Speech",callData?.user_speech_duration?fmtDur(callData.user_speech_duration):null,null],
                      ["Answered By",callData?.answered_by||null,null],
                      ["Call Ended By",callData?.call_ended_by||null,null],
                      ["Language",callData?.language||"Hinglish",null],
                      ["Started At",callData?.started_at?new Date(callData.started_at).toLocaleTimeString():null,null],
                      ["Ended At",callData?.ended_at?new Date(callData.ended_at).toLocaleTimeString():null,null],
                    ].map(([label,value,vc],idx,arr)=>(
                      <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",background:idx%2===0?"#f9fafb":"#fff",borderBottom:idx<arr.length-1?"1px solid #f3f4f6":"none"}}>
                        <span style={{fontSize:11,color:"#9ca3af",fontWeight:500,textTransform:"uppercase",letterSpacing:".04em"}}>{label}</span>
                        {value
                          ?<span style={{fontSize:13,fontWeight:600,color:vc||NAVY}}>{value}</span>
                          :<div style={{width:56,height:9,borderRadius:4,background:"#f3f4f6",animation:!isTerm?"pulse 2s infinite":"none"}}/>
                        }
                      </div>
                    ))}
                  </div>
                  {callData?.recording_url&&(
                    <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #f3f4f6"}}>
                      <div style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".04em",marginBottom:8}}>Recording</div>
                      <audio controls src={callData.recording_url} style={{width:"100%",height:36}}/>
                    </div>
                  )}
                </div>

                {/* Call Outcome */}
                <div className="fade-up d3" style={{...card,padding:24,border:`1px solid ${callData?.result&&Object.keys(callData.result).length>0?agC+"55":"transparent"}`,transition:"border-color .4s"}}>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:16,color:NAVY,display:"flex",alignItems:"center",gap:8}}><span>🎯</span> Call Outcome</h3>
                  {callData?.result&&Object.keys(callData.result).length>0?(
                    <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #f3f4f6"}}>
                      {Object.entries(callData.result).map(([k,v],idx,arr)=>(
                        <div key={k} style={{padding:"12px 14px",background:idx%2===0?"#f9fafb":"#fff",borderBottom:idx<arr.length-1?"1px solid #f3f4f6":"none"}}>
                          <div style={{fontSize:11,color:"#9ca3af",textTransform:"capitalize",letterSpacing:".03em",marginBottom:5}}>{k.replace(/_/g," ")}</div>
                          <div style={{fontSize:13,fontWeight:600,color:agC,lineHeight:1.5}}>{typeof v==="object"?JSON.stringify(v,null,2):String(v)}</div>
                        </div>
                      ))}
                    </div>
                  ):(
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {[80,55,70,45].map((w,i)=>(
                        <div key={i} style={{padding:"12px 14px",background:"#f9fafb",borderRadius:8,border:"1px solid #f3f4f6"}}>
                          <div style={{width:w,height:7,borderRadius:3,background:"#e5e7eb",marginBottom:8}}/>
                          <div style={{width:"100%",height:10,borderRadius:3,background:"#e5e7eb",animation:`pulse 2s ${i*.15}s infinite`}}/>
                        </div>
                      ))}
                      <p style={{fontSize:12,color:"#9ca3af",textAlign:"center",marginTop:4}}>{isTerm?"No outcome data returned.":"Waiting for call to complete…"}</p>
                    </div>
                  )}
                </div>

              </div>
            </div>
          </div>
        )}

        {/* ── ABOUT ── */}
        {page==="about"&&(
          <div style={{padding:"48px 56px",maxWidth:720,margin:"0 auto"}}>
            <div className="fade-up">
              <p style={{fontSize:13,fontWeight:600,color:ORANGE,letterSpacing:".06em",textTransform:"uppercase",marginBottom:12}}>Technology Partner</p>
              <h1 style={{fontSize:36,fontWeight:700,letterSpacing:"-.03em",marginBottom:8,lineHeight:1.1,color:NAVY}}>About Hunar.ai</h1>
              <div style={{width:48,height:3,background:ORANGE,borderRadius:2,marginBottom:32}}/>
            </div>
            <div className="fade-up d1" style={{...card,padding:"36px 32px"}}>
              <div style={{fontSize:15,color:"#6b7280",lineHeight:1.8}}>
                <p style={{color:NAVY,fontSize:17,fontWeight:500,marginBottom:20}}>Hunar.ai builds enterprise-grade voice AI agents that conduct natural, human-like conversations at scale.</p>
                <p style={{marginBottom:16}}>Our multilingual voice AI platform enables enterprises to automate high-volume outbound and inbound calls with context-aware, emotionally intelligent agents. Built for industries like mobility, logistics, fintech, and healthcare.</p>
                <p style={{marginBottom:16}}>Hunar's proprietary speech models are fine-tuned for Indian languages and code-mixed conversations (Hinglish, Tanglish, etc.), achieving near-human comprehension and natural turn-taking.</p>
                <p style={{marginBottom:16}}>The platform integrates seamlessly with existing CRM, telephony, and data systems — enabling deployment in days, not months.</p>
                <div style={{marginTop:28,padding:"20px 24px",background:"#f9fafb",borderRadius:12,border:"1px solid #f3f4f6"}}>
                  <p style={{fontSize:13,fontWeight:600,color:"#9ca3af",letterSpacing:".04em",textTransform:"uppercase",marginBottom:12}}>Key Capabilities</p>
                  {["Multilingual voice agents — Hindi, Tamil, Telugu, Hinglish & more","Sub-second latency with real-time speech understanding","Enterprise telephony integration (SIP, PSTN, WebRTC)","Custom voice cloning & persona design","Real-time analytics & conversation intelligence"].map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:i<4?"1px solid #f3f4f6":"none"}}>
                      <span style={{color:ORANGE,fontSize:14,marginTop:1}}>✦</span>
                      <span style={{fontSize:14,color:"#6b7280"}}>{c}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
